# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
# Flutter and .env config was not auto-generated

name: Deploy to Firebase Hosting on PR
on:
  pull_request:
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.*'
jobs:
  build_and_preview:

    if: '${{ github.event.pull_request.head.repo.full_name == github.repository &&
            github.event.pull_request.draft == false }}'
    environment:
      name: ${{github.event.pull_request.base.ref}}

    runs-on: ubuntu-latest
    steps:
      - run:
          echo 'environment is ${{ github.event.pull_request.base.ref }}'
      - uses: actions/checkout@v4
       # https://github.com/marketplace/actions/flutter-action
      - name: Setup Flutter
         # SHA for v2.16.0
        uses: subosito/flutter-action@44ac965b96f18d999802d4b807e3256d5a3f9fa1
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter config --enable-web
      - run: |
            touch .env
              echo AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }} >> .env
              echo AUTH0_NON_CUSTOM_DOMAIN=${{ secrets.AUTH0_NON_CUSTOM_DOMAIN }} >> .env
              echo CLIENT_ID=${{ secrets.CLIENT_ID }} >> .env
              echo REDIRECT_URI=${{ secrets.PREVIEW_HOSTING_URL }} >> .env
              echo CLOUD_FUNCTIONS_URL=${{ secrets.CLOUD_FUNCTIONS_URL }} >> .env
              echo SA_EMAIL=${{ secrets.SA_EMAIL }} >> .env
              echo SA_SECRET_KEY="${{ secrets.SA_SECRET_KEY }}" >> .env
              echo ENVIRONMENT="${{ secrets.ENVIRONMENT }}" >> .env
              echo DATADOG_CLIENT_TOKEN="${{ secrets.DATADOG_CLIENT_TOKEN }}" >> .env
              echo DATADOG_APP_ID="${{ secrets.DATADOG_APP_ID }}" >> .env
      - run: flutter build web --dart-define-from-file=.env
      - name: Update .firebaserc
        run: |
          old_project="DEFAULT_PROJECT"
          new_project="${{secrets.DEFAULT_PROJECT}}"
          sed -i "s/$old_project/$new_project/g" .firebaserc

          old_hosting="HOSTING_PROJECT"
          new_hosting="${{secrets.HOSTING_PROJECT}}"
          sed -i "s/$old_hosting/$new_hosting/g" .firebaserc
          
          old_hosting_targ="HOSTING_TARGET"
          new_hosting_targ="${{secrets.HOSTING_PROJECT}}"
          sed -i "s/$old_hosting_targ/$new_hosting_targ/g" firebase.json
          
          old_domain="AUTH0_DOMAIN"
          new_domain="${{secrets.AUTH0_DOMAIN}}"
          sed -i "s/$old_domain/$new_domain/g" firebase.json
          
          to_replace="AUTH0_CLIENT_ID"
          be_replaced="${{secrets.CLIENT_ID}}"
          sed -i "s/$to_replace/$be_replaced/g" firebase.json

          old_redirect_uri="AUTH0_REDIRECT_URI"
          if [[ "${{ github.event.pull_request.base.ref }}" == "development" ]]; then
            new_redirect_uri=$(printf '%s\n' "https://dev.my.account.lacity.gov" | sed 's/[&/\]/\\&/g')
          elif [[ "${{ github.event.pull_request.base.ref }}" == "sandbox" ]]; then
            new_redirect_uri=$(printf '%s\n' "https://sandbox.my.account.lacity.gov" | sed 's/[&/\]/\\&/g')
          elif [[ "${{ github.event.pull_request.base.ref }}" == "production" ]]; then
            new_redirect_uri=$(printf '%s\n' "https://my.account.lacity.gov" | sed 's/[&/\]/\\&/g')
          else
            echo "Branch name does not match 'development', 'sandbox', or 'production'. Exiting."
            exit 1
          fi
          sed -i "s/$old_redirect_uri/$new_redirect_uri/g" firebase.json

      - name: Deploy to Firebase Hosting (DEV)
        if: ${{ github.event.pull_request.base.ref == 'development' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_ACCOUNT_DEV_402917   }}
          projectId: my-account-dev-402917

      - name: Deploy to Firebase Hosting (Sandbox)
        if: ${{ github.event.pull_request.base.ref == 'sandbox' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_ACCOUNT_SANDBOX_422814 }}
          projectId: my-account-sandbox-422814
