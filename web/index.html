<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <link rel="icon" type="images/png" href="/assets/images/los_angeles_seal.svg"/>

  <title>Angeleno Account</title>
  <link rel="manifest" href="manifest.json">

  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1.2/auth0-spa-js.production.js"></script>
  <script src="https://navbar.lacity.org/global_nav.js"></script>
  <script type="text/javascript" src="https://www.datadoghq-browser-agent.com/us5/v5/datadog-logs.js"></script>
  <script type="text/javascript" src="https://www.datadoghq-browser-agent.com/us5/v5/datadog-rum-slim.js"></script>
  <script src="assets/packages/libphonenumber_plugin/js/libphonenumber.js"></script>
  <script src="assets/packages/libphonenumber_plugin/js/stringbuffer.js"></script>

  <script>
    (function() {
      function updateTitleFromUrl(urlString) {
        try {
          var url = new URL(urlString);
          var env = window.flutterEnvironment;
          var environment = env === 'production' ? '' : (env ? env + ' ' : '');
          var pathname = url.pathname;

          if (pathname === "/profile") {
            document.title = "Profile | " + environment + "Angeleno Account";
          } else if (pathname === "/password-change") {
            document.title = "Password change | " + environment + "Angeleno Account";
          } else if (pathname === "/multi-factor-authentication") {
            document.title = "Multi-factor authentication | " + environment + "Angeleno Account";
          }
        } catch (e) {
          // Ignore URL parsing errors to avoid breaking app startup.
        }
      }

      if (window.navigation && typeof window.navigation.addEventListener === "function") {
        window.navigation.addEventListener("navigate", function(event) {
          if (event && event.destination && event.destination.url) {
            updateTitleFromUrl(event.destination.url);
          }
        });
      } else {
        window.addEventListener("popstate", function() {
          updateTitleFromUrl(window.location.href);
        });
        window.addEventListener("hashchange", function() {
          updateTitleFromUrl(window.location.href);
        });
      }
    })();
  </script>

  <style>
    [id^="global_navbar_la_"] {
        position: absolute;
        z-index: 1;
        top: 0;
        left: 0;
        width: 100%;
      }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
